        var iconsDone = false;
        function markIconsLoaded() {
          if (iconsDone) return;
          iconsDone = true;
          document.documentElement.classList.add('icons-loaded');
        }

        function waitForIconFont() {
          if (!document.fonts) {
            markIconsLoaded();
            return;
          }

          if (document.fonts.check('1em Material Symbols Outlined')) {
            markIconsLoaded();
            return;
          }

          document.fonts.ready.then(function() {
            markIconsLoaded();
          });

          var pollingInterval = setInterval(function() {
            if (iconsDone) { clearInterval(pollingInterval); return; }
            if (document.fonts.check('1em Material Symbols Outlined')) {
              clearInterval(pollingInterval);
              markIconsLoaded();
            }
          }, 150);

          setTimeout(function() {
            clearInterval(pollingInterval);
            markIconsLoaded();
          }, 2000);
        }

        waitForIconFont();
      })();
    </script>
